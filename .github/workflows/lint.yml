name: lint
on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: install linters
      run: |
        sudo apt-get update
        sudo apt-get install -y npm clang-tidy lua-check
        sudo ./build.sh installdeps
        npm install --save-dev eslint eslint-plugin-jsdoc stylelint stylelint-config-standard htmlhint typescript
    - name: lint js css html lua
      run: ./build.sh lint
    - name: build debug and lint
      run: |
        ./build.sh debug
        ./build.sh check
